name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke (macOS, Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Byte-compile every source file
        run: |
          python -m compileall -q maidbook

      - name: Import smoke test
        run: |
          python -c "import maidbook; import maidbook.common; import maidbook.cache; import maidbook.health; import maidbook.tui; import maidbook.cli; print('maidbook', maidbook.__version__)"

      - name: CLI dry-run (non-interactive)
        run: |
          maidbook --version
          maidbook --cli --dry-run
